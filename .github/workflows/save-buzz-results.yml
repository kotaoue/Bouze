name: Save Buzz Cut Results

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  save-results:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'checklist/') &&
      startsWith(github.event.pull_request.title, 'Add checklist (')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Parse checkboxes and save results
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/save_buzz_results.py

      - name: Commit and push results
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "Save buzz cut results for ${PR_TITLE//[^0-9-]/}"
          git push

      - name: Trigger badge generation
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: buzz-results-saved

      - name: Create next buzz cut PR
        uses: kotaoue/pr-checklist-collector@v1
        with:
          checks: |
            0mm
            1mm
            2mm
            3mm
            4mm
            5mm
          output_file: results/{yyyy-mm-dd}.json
          assignee: kotaoue
