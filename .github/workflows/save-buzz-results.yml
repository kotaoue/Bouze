name: Save Buzz Cut Results

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  save-results:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'checklist/') &&
      startsWith(github.event.pull_request.title, 'Add checklist (')
    runs-on: ubuntu-latest
    steps:
      - name: Collect checklist and save results
        uses: kotaoue/pr-checklist-collector@v1
        with:
          output_file: results/{yyyy-mm-dd}.json
          pr_title_pattern: 'Add checklist \(\d{4}-\d{2}-\d{2}\)'

      - name: Trigger badge generation
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: buzz-results-saved

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Create next buzz cut PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="checklist/${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "Add checklist (${DATE})" \
            --body "- [ ] 0mm
- [ ] 1mm
- [ ] 2mm
- [ ] 3mm
- [ ] 4mm
- [ ] 5mm" \
            --base main \
            --assignee kotaoue
