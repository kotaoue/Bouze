name: Create Buzz Cut PR

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Commit checklist branch
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "DATE=${DATE}" >> "$GITHUB_ENV"
          if git ls-remote --heads origin "checklist/${DATE}" | grep -q .; then
            echo "Branch checklist/${DATE} already exists on remote, skipping."
            echo "BRANCH_EXISTS=true" >> "$GITHUB_ENV"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "checklist/${DATE}"
          mkdir -p temp
          echo "${DATE}" >> temp/reserved.md
          git add temp/reserved.md
          git commit -m "Add checklist (${DATE})"
          git push origin "checklist/${DATE}"

      - name: Create PR
        if: env.BRANCH_EXISTS != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$'- [ ] 0mm\n- [ ] 1mm\n- [ ] 2mm\n- [ ] 3mm\n- [ ] 4mm\n- [ ] 5mm'
          gh pr create \
            --title "Add checklist (${DATE})" \
            --body "${BODY}" \
            --base main \
            --assignee kotaoue
