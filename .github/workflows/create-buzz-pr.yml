name: Create Buzz Cut PR

on:
  schedule:
    - cron: '15 21 * * *'  # 06:15 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add buzz cut log for ${{ steps.date.outputs.date }}"
          branch: "buzz/${{ steps.date.outputs.date }}"
          title: "${{ steps.date.outputs.date }}"
          body: |
            - [ ] 0mm
            - [ ] 1mm
            - [ ] 2mm
            - [ ] 3mm
            - [ ] 4mm
            - [ ] 5mm
          assignees: kotaoue
          base: main
