<svg xmlns="http://www.w3.org/2000/svg"
     width="200" height="80"
     viewBox="0 0 200 80"
     role="img" aria-label="— days since last buzz">
  <title>No records yet</title>
  <!-- Background -->
  <rect width="200" height="80" rx="10" fill="#1a1a2e"/>
  <!-- Days count (large) -->
  <text x="100" y="32"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" text-anchor="middle"
        fill="#f5d98b" dominant-baseline="middle">— days</text>
  <!-- Label (small) -->
  <text x="100" y="56"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="400" text-anchor="middle"
        fill="#a89060" dominant-baseline="middle">since last buzz</text>
</svg>